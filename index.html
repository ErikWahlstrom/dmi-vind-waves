<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141414">
<title>DMI Combo</title>
<style>
    :root { color-scheme: dark; }

    html, body {
        margin: 0;
        padding: 0;
        background: #141414;
        color: #ddd;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.4;
    }

    /* ---------- password gate ---------- */
    #gate {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 10px;
        padding: 16px;
        box-sizing: border-box;
    }
    #gate input {
        padding: 12px;
        font-size: 16px; /* 16px prevents iOS focus zoom */
        border-radius: 8px;
        border: 1px solid #555;
        background: #2a2a2a;
        color: #fff;
        width: 12em;
        max-width: 55vw;
    }
    #gate input.bad { border-color: #d55; }
    #gate button {
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 8px;
        background: #4a9eff;
        color: #fff;
        border: none;
    }

    /* ---------- app ---------- */
    main[hidden] { display: none !important; }
    main {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 4px;
        /* keep content clear of the fixed bottom bar */
        padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
        box-sizing: border-box;
    }

    .pane { min-width: 0; min-height: 0; }

    .imgwrap {
        position: relative;
        background: #222;
        border-radius: 6px;
    }
    .imgwrap img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 6px;
        min-height: 40px;
    }
    .imgwrap .noimg {
        display: none;
        position: absolute;
        inset: 0;
        align-items: center;
        justify-content: center;
        color: #999;
        font-size: 14px;
        background: rgba(20, 20, 20, 0.6);
        border-radius: 6px;
        pointer-events: none;
    }
    .imgwrap.missing .noimg { display: flex; }
    .imgwrap.missing img { opacity: 0.25; }

    /* ---------- bottom bar (single control) ---------- */
    #dock { display: contents; }
    #bar {
        position: fixed;
        left: 0;
        bottom: 0;
        width: 100%;
        z-index: 100;
        box-sizing: border-box;
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
        background: rgba(22, 22, 22, 0.96);
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        transform-origin: left top;
        will-change: transform;
    }
    /* when JS pins the bar to the visual viewport it positions via transform from the top */
    #bar.vv {
        bottom: auto;
        top: 0;
    }

    /* ---------- scrubber ---------- */
    .scrub {
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .step {
        flex-shrink: 0;
        width: 56px;
        height: 44px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: #2b2b2b;
        color: #eee;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
    }
    .step:active { background: #3a3a3a; }
    .track {
        flex: 1;
        min-width: 0;
        height: 44px;
        position: relative;
        border-radius: 8px;
        background: #262626;
        border: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
        cursor: pointer;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
    }
    .fill {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 0;
        background: #38536e;
        border-right: 3px solid #7db4e8;
        box-sizing: border-box;
    }
    .tlabel {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-variant-numeric: tabular-nums;
        color: #eee;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        white-space: nowrap;
        pointer-events: none;
    }

    /* ---------- progress strip (top edge of the bar) ---------- */
    #progress {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
        opacity: 0;
        transition: opacity 0.4s ease;
    }
    #progress.on { opacity: 1; }
    #progressFill {
        height: 100%;
        width: 0;
        background: #4a9eff;
    }

    /* ---------- footer (in flow, end of page) ---------- */
    footer {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 4px 12px;
        padding: 6px 4px;
        font-size: 12px;
        color: #888;
        text-align: center;
    }
    footer button {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        color: #999;
        font-size: 12px;
        padding: 5px 10px;
        cursor: pointer;
    }
    footer button:disabled { opacity: 0.4; cursor: default; }
    #missingInfo { color: #d99; }

    /* ---------- desktop ---------- */
    @media (min-width: 1000px) {
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            gap: 6px;
            padding: 6px;
        }
        .pane {
            display: flex;
            flex-direction: column;
        }
        .imgwrap { flex: 1; min-height: 0; }
        .imgwrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #dock {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
            padding: 0 24px;
            min-width: 0;
        }
        #bar {
            position: static;
            transform: none !important;
            width: auto;
            padding: 8px 0;
            background: transparent;
            border-top: none;
        }
    }
</style>
</head>
<body>

<div id="gate">
    <input id="password" type="password" placeholder="password" autocomplete="current-password">
    <button id="pwdBtn" type="button">Open</button>
</div>

<main id="app" hidden>
    <section class="pane">
        <div class="imgwrap"><img id="img-win" alt="Wind"><div class="noimg">No image for this hour</div></div>
    </section>
    <section class="pane">
        <div class="imgwrap"><img id="img-hs" alt="Significant wave height"><div class="noimg">No image for this hour</div></div>
    </section>
    <section class="pane">
        <div class="imgwrap"><img id="img-hsw" alt="Swell height"><div class="noimg">No image for this hour</div></div>
    </section>
    <div id="dock">
        <div id="bar">
            <div id="progress"><div id="progressFill"></div></div>
            <div class="scrub"></div>
        </div>
        <footer>
            <span id="runInfo"></span>
            <span id="status"></span>
            <span id="missingInfo"></span>
            <button id="refreshBtn" type="button" title="Re-download all images (~66 MB)">&#10227; Reload images</button>
        </footer>
    </div>
</main>

<script>
'use strict';

var MAX = 133;                       // frames: run+0h .. run+132h
var HOUR = 3600 * 1000;
var CYCLE = 12 * HOUR;               // plots published for the 06Z and 18Z runs only
var ANCHOR = 6 * HOUR;               // cycle phase: 06Z
var PUBLISH_DELAY = 3.75 * HOUR;     // plots appear ~3.5 h after run time
var TYPES = ['win', 'hs', 'hsw'];
var PWD_HASH = 8752902336368466;

var run, cacheKey, buster = '';
var idx = 1;
var loading = false;
var keepAlive = [];                  // hold preload Image refs so they aren't GC'd mid-flight
var missing = {};                    // "win.7" -> true

var imgs = {
    win: document.getElementById('img-win'),
    hs: document.getElementById('img-hs'),
    hsw: document.getElementById('img-hsw')
};
var fills = [], labels = [];

function computeRun() {
    return new Date(Math.floor((Date.now() - PUBLISH_DELAY - ANCHOR) / CYCLE) * CYCLE + ANCHOR);
}

function url(type, i) {
    return 'https://ocean.dmi.dk/anim/plots/' + type + '.ba.' + i + '.png?cache=' + cacheKey + buster;
}

function nowIndex() {
    var i = 1 + Math.floor((Date.now() - run.getTime()) / HOUR);
    return Math.max(1, Math.min(MAX, i));
}

var WD = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
var MO = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function fmtLocal(d) {
    return WD[d.getDay()] + ' ' + d.getDate() + ' ' + MO[d.getMonth()] + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function show(i) {
    i = Math.max(1, Math.min(MAX, Math.round(i)));
    idx = i;
    TYPES.forEach(function (t) {
        var img = imgs[t];
        var u = url(t, i);
        if (img.getAttribute('src') !== u) img.src = u;
        img.parentElement.classList.toggle('missing', !!missing[t + '.' + i]);
    });
    var d = new Date(run.getTime() + (i - 1) * HOUR);
    var text = fmtLocal(d) + ' · +' + (i - 1) + 'h';
    labels.forEach(function (l) { l.textContent = text; });
    var pct = ((i - 1) / (MAX - 1) * 100) + '%';
    fills.forEach(function (f) { f.style.width = pct; });
}

function updateRunInfo() {
    document.getElementById('runInfo').textContent =
        'Forecast run: ' + WD[run.getUTCDay()] + ' ' + run.getUTCDate() + ' ' + MO[run.getUTCMonth()] + ' ' + pad(run.getUTCHours()) + 'Z';
}

/* ---------- scrubber ---------- */

var CHEV_L = '<svg width="14" height="14" viewBox="0 0 12 12" fill="none"><path d="M7.5 2L3.5 6L7.5 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var CHEV_R = '<svg width="14" height="14" viewBox="0 0 12 12" fill="none"><path d="M4.5 2L8.5 6L4.5 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function buildScrub(el) {
    el.innerHTML =
        '<button class="step" type="button" aria-label="1 hour back">' + CHEV_L + '</button>' +
        '<div class="track" role="slider" aria-label="Forecast time">' +
        '<div class="fill"></div><span class="tlabel"></span>' +
        '</div>' +
        '<button class="step" type="button" aria-label="1 hour forward">' + CHEV_R + '</button>';

    var btns = el.querySelectorAll('.step');
    var track = el.querySelector('.track');
    fills.push(el.querySelector('.fill'));
    labels.push(el.querySelector('.tlabel'));

    attachStep(btns[0], -1);
    attachStep(btns[1], +1);
    attachTrack(track);
}

function attachStep(btn, d) {
    var delay = null, repeat = null;
    function stop() {
        clearTimeout(delay);
        clearInterval(repeat);
        delay = repeat = null;
    }
    btn.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        show(idx + d);
        delay = setTimeout(function () {
            repeat = setInterval(function () { show(idx + d); }, 150);
        }, 450);
    });
    ['pointerup', 'pointercancel', 'pointerleave'].forEach(function (ev) {
        btn.addEventListener(ev, stop);
    });
    btn.addEventListener('click', function (e) {
        if (e.detail === 0) show(idx + d); // keyboard activation only
    });
}

function attachTrack(track) {
    var active = false;
    function set(e) {
        var r = track.getBoundingClientRect();
        if (r.width < 1) return;
        var f = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
        show(1 + f * (MAX - 1));
    }
    track.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        active = true;
        try { track.setPointerCapture(e.pointerId); } catch (err) {}
        set(e);
    });
    track.addEventListener('pointermove', function (e) { if (active) set(e); });
    track.addEventListener('pointerup', function () { active = false; });
    track.addEventListener('pointercancel', function () { active = false; });
}

/* ---------- pin the bar to the bottom of the visual viewport ----------
   position:fixed pins to the LAYOUT viewport, which iOS leaves behind when
   pinch-zooming. Counter-transform the bar so it hugs the bottom of what is
   actually visible, at constant on-screen size. */

(function initBarPinning() {
    var bar = document.getElementById('bar');
    var vv = window.visualViewport;
    var mq = window.matchMedia('(max-width: 999px)');
    if (!vv) return; // CSS bottom:0 fallback

    var pending = false;
    function update() {
        pending = false;
        if (!mq.matches) {
            bar.classList.remove('vv');
            bar.style.transform = '';
            return;
        }
        bar.classList.add('vv');
        var s = vv.scale;
        var h = bar.offsetHeight; // unscaled CSS px
        var x = vv.offsetLeft;
        var y = vv.offsetTop + vv.height - h / s;
        bar.style.transform = 'translate(' + x + 'px,' + y + 'px) scale(' + (1 / s) + ')';
    }
    function req() {
        if (!pending) {
            pending = true;
            requestAnimationFrame(update);
        }
    }
    vv.addEventListener('resize', req);
    vv.addEventListener('scroll', req);
    window.addEventListener('resize', req);
    window.addEventListener('scroll', req, { passive: true });
    if (mq.addEventListener) mq.addEventListener('change', req);
    req();
})();

/* ---------- preload ---------- */

function setProgress(done, total, failed) {
    var bar = document.getElementById('progress');
    document.getElementById('progressFill').style.width = (done / total * 100) + '%';
    var status = document.getElementById('status');
    if (done < total) {
        bar.classList.add('on');
        status.textContent = 'Loading ' + done + '/' + total;
    } else {
        bar.classList.remove('on');
        status.textContent = '';
    }
    document.getElementById('missingInfo').textContent =
        failed > 0 ? failed + ' images missing' : '';
}

function preload(force) {
    if (loading) return;
    loading = true;
    buster = force ? '&r=' + Math.random() : '';
    missing = {};
    keepAlive = [];
    var refreshBtn = document.getElementById('refreshBtn');
    refreshBtn.disabled = true;

    var total = MAX * TYPES.length;
    var done = 0, failed = 0;
    setProgress(0, total, 0);

    function tick() {
        setProgress(done, total, failed);
        if (done === total) {
            loading = false;
            refreshBtn.disabled = false;
            keepAlive = [];
            show(idx); // refresh missing-overlays for current frame
        }
    }

    for (var i = 1; i <= MAX; i++) {
        TYPES.forEach(function (t) {
            var im = new Image();
            var key = t + '.' + this;
            im.onload = function () { done++; tick(); };
            im.onerror = function () { done++; failed++; missing[key] = true; tick(); };
            im.src = url(t, this);
            keepAlive.push(im);
        }, i);
    }
}

/* ---------- new-run detection ---------- */

function maybeNewRun() {
    var r = computeRun();
    if (r.getTime() !== run.getTime() && !loading) {
        run = r;
        cacheKey = r.toISOString();
        buster = '';
        updateRunInfo();
        show(nowIndex());
        preload();
    }
}
document.addEventListener('visibilitychange', function () {
    if (!document.hidden) maybeNewRun();
});
setInterval(maybeNewRun, 10 * 60 * 1000);

/* ---------- password gate ---------- */

var cyrb53 = function (str, seed) {
    seed = seed || 0;
    var h1 = 0xdeadbeef ^ seed, h2 = 0x41c6ce57 ^ seed;
    for (var i = 0, ch; i < str.length; i++) {
        ch = str.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761);
        h2 = Math.imul(h2 ^ ch, 1597334677);
    }
    h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507);
    h1 ^= Math.imul(h2 ^ (h2 >>> 13), 3266489909);
    h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507);
    h2 ^= Math.imul(h1 ^ (h1 >>> 13), 3266489909);
    return 4294967296 * (2097151 & h2) + (h1 >>> 0);
};

function unlock() {
    document.getElementById('gate').remove();
    document.getElementById('app').hidden = false;
    updateRunInfo();
    show(nowIndex());
    window.dispatchEvent(new Event('resize')); // bar height is measurable now
    setTimeout(function () { preload(); }, 400);
}

function tryPassword(pwd) {
    if (cyrb53(pwd) === PWD_HASH) {
        try { localStorage.setItem('password', pwd); } catch (e) {}
        unlock();
        return true;
    }
    return false;
}

document.getElementById('pwdBtn').addEventListener('click', function () {
    var input = document.getElementById('password');
    if (!tryPassword(input.value)) input.classList.add('bad');
});
document.getElementById('password').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !tryPassword(this.value)) this.classList.add('bad');
});

/* ---------- init ---------- */

run = computeRun();
cacheKey = run.toISOString();

document.querySelectorAll('.scrub').forEach(buildScrub);

TYPES.forEach(function (t) {
    var img = imgs[t];
    img.addEventListener('error', function () {
        img.parentElement.classList.add('missing');
    });
    img.addEventListener('load', function () {
        img.parentElement.classList.remove('missing');
    });
});

window.addEventListener('keydown', function (e) {
    if (document.getElementById('app').hidden) return;
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft') { show(idx - 1); e.preventDefault(); }
    else if (e.key === 'ArrowRight') { show(idx + 1); e.preventDefault(); }
    else if (e.key === 'Home') { show(1); e.preventDefault(); }
    else if (e.key === 'End') { show(MAX); e.preventDefault(); }
});

document.getElementById('refreshBtn').addEventListener('click', function () {
    maybeNewRun();
    if (!loading) preload(true);
});

var saved = null;
try { saved = localStorage.getItem('password'); } catch (e) {}
if (saved !== null) tryPassword(saved);
</script>

</body>
</html>
